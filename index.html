<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SOURCE MIRROR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
            min-height: 100vh;
            color: #e0e0ff;
        }
        .container {
            max-width: 1500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #8b5cf6;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }
        .header p {
            color: #c4b5fd;
            margin-top: 8px;
        }
        .input-panel {
            background: rgba(15, 12, 41, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid #8b5cf6;
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.25);
        }
        .url-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .url-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #8b5cf6;
            border-radius: 40px;
            padding: 14px 18px;
            color: #ddd6fe;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }
        .url-input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 12px rgba(192, 132, 252, 0.4);
        }
        .btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            transition: 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.5);
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
        }
        .options-bar {
            display: flex;
            gap: 15px;
            margin-top: 18px;
            flex-wrap: wrap;
            align-items: center;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #c4b5fd;
        }
        .method-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8b5cf6;
            border-radius: 30px;
            padding: 8px 12px;
            color: #ddd6fe;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .split-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .result-panel, .preview-panel {
            background: rgba(15, 12, 41, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid #8b5cf6;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .panel-header {
            background: rgba(109, 40, 217, 0.3);
            padding: 12px 20px;
            border-bottom: 1px solid #8b5cf6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .panel-title {
            font-size: 0.8rem;
            color: #c084fc;
            font-family: monospace;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        .small-btn {
            background: rgba(109, 40, 217, 0.5);
            border: 1px solid #8b5cf6;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: monospace;
            color: #ddd6fe;
            transition: 0.2s;
        }
        .small-btn:hover {
            background: #7c3aed;
            border-color: #c084fc;
        }
        .source-viewer {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            overflow: auto;
            max-height: 520px;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: #ddd6fe;
            flex: 1;
        }
        .source-viewer pre {
            margin: 0;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
        }
        .preview-frame {
            width: 100%;
            height: 520px;
            border: none;
            background: #0f0c29;
            border-radius: 12px;
        }
        .error-message {
            background: rgba(220, 38, 38, 0.2);
            border-left: 4px solid #f87171;
            padding: 16px;
            color: #fca5a5;
        }
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #4c1d95;
            border-top: 3px solid #c084fc;
            border-right: 3px solid #a78bfa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .pulse-dots {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        .pulse-dots span {
            width: 10px;
            height: 10px;
            background: #c084fc;
            border-radius: 50%;
            animation: pulse 1.4s ease-in-out infinite;
        }
        .pulse-dots span:nth-child(1) { animation-delay: 0s; }
        .pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }
        .loading-text {
            color: #c084fc;
            font-family: monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #8b5cf6;
        }
        @media (max-width: 900px) {
            .split-panel { grid-template-columns: 1fr; }
            body { padding: 12px; }
            .url-input-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>𝗦𝗢𝗨𝗥𝗖𝗘 𝗠𝗜𝗥𝗥𝗢𝗥</h1>
        <p>v5.00.1 ©by derty</p>
    </div>

    <div class="input-panel">
        <div class="url-input-group">
            <input type="text" id="targetUrl" class="url-input" placeholder="https://example.com" value="https://example.com">

            <label class="checkbox-label">
                <input type="checkbox" id="prettyCheckbox" checked> Pretty print

            <label class="checkbox-label">
                <input type="checkbox" id="rawCheckbox"> Raw respone

            <select id="methodSelect" class="method-select">
                <option value="auto">AUTO (coba semua)</option>

                <option value="corsa">CORS Anywhere</option>
                <option value="corst">cors.sh</option>

                <option value="archive">Archive.org</option>

                <option value="r.jina">Jina Reader</option>

    <div class="split-panel">
        <div class="result-panel">
            <div class="panel-header">
                <span class="panel-title" id="resultUrlLabel">URL: -</span>
                <div class="action-buttons">
                    <button id="copyBtn" class="small-btn">COPY</button>
                    <button id="downloadBtn" class="small-btn">DOWNLOAD</button>
                    <button id="clearBtn" class="small-btn">CLEAR</button>
                </div>
            </div>
            <div id="sourceContainer" class="source-viewer">
                <div style="color: #7e8aa2; text-align: center; padding: 40px;">
                    
                </div>

        <div class="preview-panel">
            <div class="panel-header">
                <span class="panel-title">LIVE PREVIEW</span>

                    <button id="openPreviewBtn" class="small-btn">NEWTAB</button>

                <iframe id="previewFrame" class="preview-frame" srcdoc="<html><body style='margin:0;background:#0f0c29;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace'><div style='text-align:center'><div style='width:45px;height:45px;border:2px solid #4c1d95;border-top:2px solid #c084fc;border-right:2px solid #a78bfa;border-radius:50%;animation:s 0.8s linear infinite;margin:0 auto 16px auto'></div><div style='color:#a78bfa'>waitting</div><style>@keyframes s{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}</style></div></body></html>"></iframe>
            </div>
        </div>
    </div>

         v5.00.1 ©by derty

<script>
    const targetUrlInput = document.getElementById('targetUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const sourceContainer = document.getElementById('sourceContainer');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const refreshPreviewBtn = document.getElementById('refreshPreviewBtn');
    const openPreviewBtn = document.getElementById('openPreviewBtn');
    const previewFrame = document.getElementById('previewFrame');
    const resultUrlLabel = document.getElementById('resultUrlLabel');
    const prettyCheckbox = document.getElementById('prettyCheckbox');
    const rawCheckbox = document.getElementById('rawCheckbox');
    const methodSelect = document.getElementById('methodSelect');

    let lastRawHtml = '';
    let lastFetchedUrl = '';
    let lastRawUrl = '';

    async function m_allorigins(url) {
        const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        const res = await fetch(proxy);
        if (!res.ok) throw new Error(`AllOrigins ${res.status}`);
        return await res.text();
    }

    async function m_corsproxy(url) {
        const proxy = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        const res = await fetch(proxy);
        if (!res.ok) throw new Error(`CORSProxy ${res.status}`);
        return await res.text();
    }

    async function m_corsa(url) {
        const proxy = `https://cors-anywhere.herokuapp.com/${url}`;
        const res = await fetch(proxy, { headers: { 'Origin': window.location.origin } });
        if (!res.ok) throw new Error(`CORS Anywhere ${res.status}`);
        return await res.text();
    }

    async function m_corst(url) {
        const proxy = `https://cors.sh/${url}`;
        const res = await fetch(proxy, { headers: { 'Origin': window.location.origin, 'x-cors-grin': 'true' } });
        if (!res.ok) throw new Error(`cors.sh error ${res.status}`);
        return await res.text();
    }

    async function m_googlecache(url) {
        const cacheUrl = `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(url)}&strip=1&vwsrc=0`;
        const res = await fetch(cacheUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error('Google cache tidak ditemukan');
        let html = await res.text();
        const match = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
        if (match) return match[1];
        return html;
    }

    async function m_yandex(url) {
        const cacheUrl = `https://cache.yandex.net/caches/navigator?url=${encodeURIComponent(url)}&strip=1`;
        const res = await fetch(cacheUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error('Yandex cache tidak tersedia');
        return await res.text();
    }

    async function m_archive(url) {
        const apiUrl = `https://archive.org/wayback/available?url=${encodeURIComponent(url)}`;
        const meta = await fetch(apiUrl);
        const metaJson = await meta.json();
        if (!metaJson.archived_snapshots?.closest) throw new Error('Tidak ada snapshot di archive.org');
        const snapshotUrl = metaJson.archived_snapshots.closest.url;
        const res = await fetch(snapshotUrl);
        if (!res.ok) throw new Error('gagal mengambil snapshot');
        return await res.text();
    }

    async function m_textise(url) {
        const textiseUrl = `https://textise.iitty.com/?u=${encodeURIComponent(url)}`;
        const res = await fetch(textiseUrl);
        if (!res.ok) throw new Error('Textise gagal');
        let txt = await res.text();
        const match = txt.match(/<div id="content"[^>]*>([\s\S]*?)<\/div>/i);
        if (match && match[1]) return match[1];
        throw new Error('tidak bisa parse textise');
    }

    async function m_jina(url) {
        const jinaUrl = `https://r.jina.ai/${encodeURIComponent(url)}`;
        const res = await fetch(jinaUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error(`Jina AI error ${res.status}`);
        return await res.text();
    }

    async function m_whatsmydns(url) {
        const api = `https://www.whatsmydns.net/api/lookup?type=HTML&host=${encodeURIComponent(url)}`;
        const res = await fetch(api);
        if (!res.ok) throw new Error('whatsmydns api error');
        const json = await res.json();
        if (json?.data?.html) return json.data.html;
        throw new Error('no source from whatsmydns');
    }

    async function m_iframe(url) {
        return new Promise((resolve, reject) => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals';
            let timeout = setTimeout(() => {
                iframe.remove();
                reject(new Error('iframe timeout / CORS block'));
            }, 15000);
            iframe.onload = () => {
                try {
                    let doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc && doc.documentElement) {
                        let html = doc.documentElement.outerHTML;
                        clearTimeout(timeout);
                        iframe.remove();
                        resolve(html);
                    } else {
                        clearTimeout(timeout);
                        iframe.remove();
                        reject(new Error('tidak bisa akses konten iframe (CORS)'));
                    }
                } catch (e) {
                    clearTimeout(timeout);
                    iframe.remove();
                    reject(new Error('iframe cross-origin blocked'));
                }
            };
            iframe.onerror = () => {
                clearTimeout(timeout);
                iframe.remove();
                reject(new Error('iframe gagal load'));
            };
            document.body.appendChild(iframe);
        });
    }

    async function m_scraperapi(url) {
        const apiUrl = `https://scraperapi.p.rapidapi.com/?url=${encodeURIComponent(url)}&render=true`;
        try {
            const res = await fetch(apiUrl, {
                headers: { 'x-rapidapi-key': 'demo', 'x-rapidapi-host': 'scraperapi.p.rapidapi.com' }
            });
            if (!res.ok) throw new Error('scraperapi error');
            return await res.text();
        } catch (e) {
            const fallback = await m_allorigins(url);
            return fallback;
        }
    }

    async function m_direct(url) {
        const res = await fetch(url, { mode: 'cors', headers: { 'User-Agent': 'Mozilla/5.0 (compatible; OmniSource)' } });
        if (!res.ok) throw new Error(`Direct HTTP ${res.status}`);
        return await res.text();
    }

    const methodMap = {
        allorigins: m_allorigins,
        corsproxy: m_corsproxy,
        corsa: m_corsa,
        corst: m_corst,
        googlecache: m_googlecache,
        yandex: m_yandex,
        archive: m_archive,
        textise: m_textise,
        'r.jina': m_jina,
        whatsmydns: m_whatsmydns,
        iframe: m_iframe,
        scraperapi: m_scraperapi,
        direct: m_direct
    };

    async function fetchWithMethod(url, methodName) {
        const fn = methodMap[methodName];
        if (!fn) throw new Error(`metode ${methodName} tidak dikenal`);
        return await fn(url);
    }

    async function fetchAuto(url) {
        const order = ['allorigins', 'corsproxy', 'corsa', 'corst', 'googlecache', 'yandex', 'archive', 'textise', 'r.jina', 'whatsmydns', 'scraperapi', 'iframe', 'direct'];
        let lastError = null;
        for (const m of order) {
            try {
                const html = await fetchWithMethod(url, m);
                if (html && html.length > 30) {
                    console.log(`sukses pakai ${m}`);
                    return { html, method: m };
                }
            } catch (e) {
                lastError = e;
                console.warn(`${m} gagal:`, e.message);
            }
        }
        throw lastError || new Error('semua metode gagal total');
    }

    async function masterFetch(url) {
        const selected = methodSelect.value;
        if (selected === 'auto') {
            const { html, method } = await fetchAuto(url);
            return { html, method };
        } else {
            const html = await fetchWithMethod(url, selected);
            return { html, method: selected };
        }
    }

    function prettyHtml(html) {
        if (rawCheckbox.checked) return html;
        let formatted = html.replace(/>\s*</g, '>\n<').replace(/(\n\s*)+/g, '\n');
        let indent = 0;
        let lines = formatted.split('\n');
        let result = [];
        for (let line of lines) {
            let trimmed = line.trim();
            if (trimmed.match(/^<\/[^>]+>/)) indent = Math.max(0, indent - 1);
            let spaces = '  '.repeat(indent);
            result.push(spaces + trimmed);
            if (trimmed.match(/^<[^\/?!][^>]*[^\/]>$/) && !trimmed.match(/<(br|hr|img|input|link|meta|area|base|col|embed|source|track|wbr)/i)) {
                indent++;
            }
        }
        return result.join('\n');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getFancyPreviewLoadingHTML() {
        return `
            <!DOCTYPE html>
            <html>
            <head>
                <style>

                    .neon-spinner .ring:nth-child(3) {
                        width: 60%;

                        animation-duration: 1s;
                    }
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                    .pulse-container {
                        display: flex;
                        gap: 14px;
                        justify-content: center;
                        margin-bottom: 24px;
                    }
                    .pulse-ball {
                        width: 12px;

                    }
                    .pulse-ball:nth-child(1) { animation-delay: 0s; background: #c084fc; }
                    .pulse-ball:nth-child(2) { animation-delay: 0.15s; background: #a78bfa; }
                    .pulse-ball:nth-child(3) { animation-delay: 0.3s; background: #8b5cf6; }

                    .loading-text {

                </style>
            </head>
            <body>
                <div class="loader-wrapper">
                    <div class="neon-spinner">

                    <div class="loading-text">
                        LOADING PREVIEW
                        <div class="loading-dots">
                            <span>.</span><span>.</span><span>.</span>
                        </div>
                    </div>
                </div>
            </body>
            </html>
        `;
    }

    function showPreviewLoading() {
        previewFrame.srcdoc = getFancyPreviewLoadingHTML();
    }

    function updatePreview(htmlContent, baseUrl) {
        if (!htmlContent) {
            showPreviewLoading();
            return;
        }
        let doc = htmlContent;
        if (!doc.toLowerCase().includes('<html')) {
            doc = `<html><head><base href="${baseUrl}"><style>body{background:white;}</style></head><body>${doc}</body></html>`;
        } else {
            doc = doc.replace(/<head/i, `<head><base href="${baseUrl}">`);
        }
        previewFrame.srcdoc = doc;
    }

    function showLoadingAnimation() {
        sourceContainer.innerHTML = `
            <div class="loading-container">
                <div class="spinner"></div>
                <div class="pulse-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="loading-text">mengeksekusi ${methodSelect.value}</div>
            </div>
        `;
        showPreviewLoading();
    }

    function displaySource(htmlContent, originalUrl, methodUsed) {
        lastRawHtml = htmlContent;
        lastFetchedUrl = originalUrl;
        let info = `URL: ${originalUrl} | size: ${(htmlContent.length/1024).toFixed(1)} KB | method: ${methodUsed}`;
        resultUrlLabel.innerText = info;
        let finalHtml = prettyCheckbox.checked ? prettyHtml(htmlContent) : htmlContent;
        sourceContainer.innerHTML = `<pre>${escapeHtml(finalHtml)}</pre>`;
        updatePreview(htmlContent, originalUrl);
    }

    function showError(msg, url) {
        sourceContainer.innerHTML = `<div class="error-message">
            GAGAL: ${escapeHtml(msg)}<br>
            URL: ${escapeHtml(url)}<br>
            coba ganti metode (googlecache / archive / iframe)
        </div>`;
        previewFrame.srcdoc = "<html><body style='background:#0f0c29;color:#fca5a5;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace'>Gagal memuat preview</body></html>";
        lastRawHtml = '';
        resultUrlLabel.innerText = 'URL: error';
    }

    async function fetchSource() {
        let rawUrl = targetUrlInput.value.trim();
        if (!rawUrl) { showError('URL kosong', ''); return; }
        if (!rawUrl.startsWith('http')) rawUrl = 'https://' + rawUrl;
        targetUrlInput.value = rawUrl;
        lastRawUrl = rawUrl;
        showLoadingAnimation();
        try {
            const { html, method } = await masterFetch(rawUrl);
            if (!html || html.length < 15) throw new Error('konten terlalu pendek');
            displaySource(html, rawUrl, method);
        } catch (err) {
            showError(err.message, rawUrl);
        }
    }

    function refreshPreview() {
        if (lastRawHtml && lastFetchedUrl) {
            updatePreview(lastRawHtml, lastFetchedUrl);
        } else if (lastRawUrl) {
            previewFrame.src = lastRawUrl;
        } else {
            alert('belum ada halaman yang diambil');
        }
    }

    function openPreviewNewTab() {
        if (lastRawHtml && lastFetchedUrl) {
            const blob = new Blob([lastRawHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 100);
        } else if (lastRawUrl) {
            window.open(lastRawUrl, '_blank');
        } else {
            alert('tidak ada preview untuk dibuka');
        }
    }

    function copySource() {
        if (!lastRawHtml) { alert('tidak ada source'); return; }
        navigator.clipboard.writeText(lastRawHtml);
        alert('source disalin ke clipboard');
    }

    function downloadSource() {
        if (!lastRawHtml) { alert('tidak ada konten'); return; }
        const blob = new Blob([lastRawHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        let fname = lastFetchedUrl ? `omni_${lastFetchedUrl.replace(/[^a-z0-9]/gi, '_').substring(0, 50)}.html` : 'source.html';
        a.href = url;
        a.download = fname;
        a.click();
        URL.revokeObjectURL(url);
    }

    function clearAll() {
        sourceContainer.innerHTML = `<div style="color: #7e8aa2; text-align: center; padding: 40px;">bersih. masukkan url baru.</div>`;
        showPreviewLoading();
        lastRawHtml = '';
        lastFetchedUrl = '';
        resultUrlLabel.innerText = 'URL: -';
    }

    function reRender() {
        if (lastRawHtml) {
            let final = prettyCheckbox.checked ? prettyHtml(lastRawHtml) : lastRawHtml;
            sourceContainer.innerHTML = `<pre>${escapeHtml(final)}</pre>`;
        }
    }

    fetchBtn.addEventListener('click', fetchSource);
    copyBtn.addEventListener('click', copySource);
    downloadBtn.addEventListener('click', downloadSource);
    clearBtn.addEventListener('click', clearAll);
    refreshPreviewBtn.addEventListener('click', refreshPreview);
    openPreviewBtn.addEventListener('click', openPreviewNewTab);
    targetUrlInput.addEventListener('keypress', e => { if (e.key === 'Enter') fetchSource(); });
    prettyCheckbox.addEventListener('change', reRender);
    rawCheckbox.addEventListener('change', reRender);
</script>
</body>
    </html>
