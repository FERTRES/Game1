<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Source Mirror - No Proxy Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            font-family: 'Courier New', 'Fira Code', monospace;
            padding: 20px;
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #2a3a6a;
            padding-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            color: #6c9eff;
            letter-spacing: 2px;
        }

        .header p {
            color: #7a8aa0;
            font-size: 0.8rem;
            margin-top: 8px;
        }

        .input-panel {
            background: #11161f;
            border: 1px solid #2a3a5a;
            border-radius: 16px;
            padding: 22px;
            margin-bottom: 28px;
        }

        .url-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            background: #0a0f18;
            border: 1px solid #2a4a7a;
            padding: 14px 18px;
            border-radius: 40px;
            color: #b0d0ff;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            transition: 0.2s;
        }

        .url-input:focus {
            border-color: #6c9eff;
            box-shadow: 0 0 8px rgba(108,158,255,0.3);
        }

        .btn {
            background: #1e2a3e;
            border: 1px solid #3a5a8a;
            padding: 12px 28px;
            border-radius: 40px;
            color: #bbd9ff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
        }

        .btn-primary {
            background: #2a4a7a;
            border-color: #6c9eff;
            color: white;
        }

        .btn-primary:hover {
            background: #3a6aaa;
            transform: translateY(-1px);
        }

        .btn:hover {
            background: #2a3a55;
        }

        .options-bar {
            display: flex;
            gap: 15px;
            margin-top: 18px;
            flex-wrap: wrap;
            align-items: center;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #8a9ac0;
        }

        .method-select {
            background: #0a0f18;
            border: 1px solid #2a4a7a;
            padding: 8px 12px;
            border-radius: 30px;
            color: #bbd9ff;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .result-panel {
            background: #0c111c;
            border-radius: 18px;
            border: 1px solid #2a3a5a;
            overflow: hidden;
        }

        .result-header {
            background: #0f1622;
            padding: 14px 20px;
            border-bottom: 1px solid #2a3a5a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .result-title {
            font-size: 0.8rem;
            color: #6c9eff;
            font-family: monospace;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .small-btn {
            background: #1a2538;
            border: 1px solid #3a5580;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: monospace;
            color: #bbd0ff;
        }

        .small-btn:hover {
            background: #2a3e60;
        }

        .source-viewer {
            background: #050a12;
            padding: 20px;
            overflow: auto;
            max-height: 550px;
            font-family: 'Courier New', 'Fira Code', monospace;
            font-size: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
            color: #c0d0f0;
        }

        .source-viewer pre {
            margin: 0;
            white-space: pre-wrap;
            font-family: inherit;
        }

        .error-message {
            background: #2a1018;
            border-left: 4px solid #ff6680;
            padding: 16px;
            color: #ffaa99;
            font-family: monospace;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #6c9eff;
            font-family: monospace;
        }

        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.7rem;
            color: #4a5a78;
        }

        @media (max-width: 680px) {
            body { padding: 12px; }
            .url-input-group { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>SOURCE MIRROR</h1>
        <p>ambil source HTML via server-side / jsonp / fallback</p>
    </div>

    <div class="input-panel">
        <div class="url-input-group">
            <input type="text" id="targetUrl" class="url-input" placeholder="https://example.com" value="https://example.com">
            <button id="fetchBtn" class="btn btn-primary">AMBIL SOURCE</button>
        </div>
        <div class="options-bar">
            <label class="checkbox-label">
                <input type="checkbox" id="prettyCheckbox" checked> Format rapi
            </label>
            <label class="checkbox-label">
                <input type="checkbox" id="rawCheckbox"> Raw response
            </label>
            <select id="methodSelect" class="method-select">
                <option value="auto">Auto (coba semua)</option>
                <option value="corsproxy">CORS Proxy</option>
                <option value="allorigins">AllOrigins</option>
                <option value="jsonp">JSONP Google</option>
                <option value="textise">Textise.iitty</option>
            </select>
        </div>
    </div>

    <div class="result-panel">
        <div class="result-header">
            <span class="result-title" id="resultUrlLabel">URL: -</span>
            <div class="action-buttons">
                <button id="copyBtn" class="small-btn">COPY SOURCE</button>
                <button id="downloadBtn" class="small-btn">DOWNLOAD HTML</button>
                <button id="clearBtn" class="small-btn">CLEAR</button>
            </div>
        </div>
        <div id="sourceContainer" class="source-viewer">
            <div style="color: #6a7c9e; text-align: center; padding: 40px;">
                masukkan URL dan klik ambil source
            </div>
        </div>
    </div>
    <div class="footer">
        source mirror • multi metode tanpa proxy mandiri
    </div>
</div>

<script>
    const targetUrlInput = document.getElementById('targetUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const sourceContainer = document.getElementById('sourceContainer');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultUrlLabel = document.getElementById('resultUrlLabel');
    const prettyCheckbox = document.getElementById('prettyCheckbox');
    const rawCheckbox = document.getElementById('rawCheckbox');
    const methodSelect = document.getElementById('methodSelect');

    let lastRawHtml = '';
    let lastFetchedUrl = '';

    // METHOD 1: AllOrigins (CORS proxy gratis)
    async function fetchAllOrigins(url) {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error(`AllOrigins HTTP ${res.status}`);
        return await res.text();
    }

    // METHOD 2: CORSProxy.io
    async function fetchCorsProxy(url) {
        const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error(`CORSProxy HTTP ${res.status}`);
        return await res.text();
    }

    // METHOD 3: JSONP via Google WebCache (alternatif)
    async function fetchViaGoogleCache(url) {
        const cacheUrl = `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(url)}&strip=1&vwsrc=0`;
        const res = await fetch(cacheUrl, {
            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36' }
        });
        if (!res.ok) throw new Error('Google cache tidak tersedia');
        let html = await res.text();
        // ekstrak konten dari halaman cache google
        if (html.includes('<pre') || html.includes('id="google-cache')) {
            return html;
        }
        return html;
    }

    // METHOD 4: Textise.iitty (scraper sederhana)
    async function fetchTextise(url) {
        const textiseUrl = `https://textise.iitty.com/?u=${encodeURIComponent(url)}`;
        const res = await fetch(textiseUrl);
        if (!res.ok) throw new Error('Textise gagal');
        let text = await res.text();
        const match = text.match(/<div id="content"[^>]*>([\s\S]*?)<\/div>/i);
        if (match && match[1]) return match[1];
        throw new Error('tidak bisa parse textise');
    }

    // METHOD 5: direct fetch (tanpa proxy)
    async function fetchDirect(url) {
        const res = await fetch(url, {
            mode: 'cors',
            headers: { 'User-Agent': 'Mozilla/5.0 (compatible; SourceViewer/1.0)' }
        });
        if (!res.ok) throw new Error(`Direct HTTP ${res.status}`);
        return await res.text();
    }

    async function fetchWithMethod(url, method) {
        switch(method) {
            case 'allorigins': return await fetchAllOrigins(url);
            case 'corsproxy': return await fetchCorsProxy(url);
            case 'jsonp': return await fetchViaGoogleCache(url);
            case 'textise': return await fetchTextise(url);
            case 'direct': return await fetchDirect(url);
            default: throw new Error('unknown method');
        }
    }

    async function fetchAuto(url) {
        const methods = ['allorigins', 'corsproxy', 'jsonp', 'textise', 'direct'];
        let lastError = null;
        for (const m of methods) {
            try {
                const result = await fetchWithMethod(url, m);
                if (result && result.length > 50) {
                    console.log(`success using ${m}`);
                    return result;
                }
            } catch (e) {
                lastError = e;
                console.warn(`${m} failed:`, e.message);
            }
        }
        throw lastError || new Error('semua metode gagal');
    }

    async function fetchHtmlSmart(url) {
        const selectedMethod = methodSelect.value;
        if (selectedMethod === 'auto') {
            return await fetchAuto(url);
        } else {
            return await fetchWithMethod(url, selectedMethod);
        }
    }

    function prettyPrintHtml(htmlString) {
        if (rawCheckbox.checked) return htmlString;
        
        let formatted = htmlString
            .replace(/>\s*</g, '>\n<')
            .replace(/(\n\s*)+/g, '\n');
        
        let indent = 0;
        let lines = formatted.split('\n');
        let result = [];
        for (let line of lines) {
            let trimmed = line.trim();
            if (trimmed.match(/^<\/[^>]+>/)) indent = Math.max(0, indent - 1);
            let spaces = '  '.repeat(indent);
            result.push(spaces + trimmed);
            if (trimmed.match(/^<[^\/?!][^>]*[^\/]>$/) && !trimmed.match(/<(br|hr|img|input|link|meta|area|base|col|embed|source|track|wbr)/i)) {
                indent++;
            }
        }
        return result.join('\n');
    }

    function displaySource(htmlContent, originalUrl, methodUsed = '') {
        lastRawHtml = htmlContent;
        lastFetchedUrl = originalUrl;
        let info = `URL: ${originalUrl} | size: ${(htmlContent.length/1024).toFixed(1)} KB`;
        if (methodUsed) info += ` | method: ${methodUsed}`;
        resultUrlLabel.innerText = info;

        let finalHtml = prettyCheckbox.checked ? prettyPrintHtml(htmlContent) : htmlContent;
        const escaped = escapeHtml(finalHtml);
        sourceContainer.innerHTML = `<pre>${escaped}</pre>`;
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function showError(msg, urlHint = '') {
        sourceContainer.innerHTML = `<div class="error-message">
            GAGAL mengambil source<br>
            Detail: ${escapeHtml(msg)}<br>
            URL: ${escapeHtml(urlHint || targetUrlInput.value)}
            <br><br>Tips: coba ganti metode di dropdown (jsonp / textise)
        </div>`;
        lastRawHtml = '';
        resultUrlLabel.innerText = `URL: error`;
    }

    function showLoading() {
        sourceContainer.innerHTML = `<div class="loading">memuat source ... (${methodSelect.value})</div>`;
    }

    async function fetchSource() {
        let rawUrl = targetUrlInput.value.trim();
        if (!rawUrl) {
            showError('URL kosong');
            return;
        }
        if (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) {
            rawUrl = 'https://' + rawUrl;
            targetUrlInput.value = rawUrl;
        }
        
        showLoading();
        
        try {
            const htmlContent = await fetchHtmlSmart(rawUrl);
            if (!htmlContent || htmlContent.length < 20) {
                throw new Error('konten terlalu pendek atau tidak valid');
            }
            let usedMethod = methodSelect.value;
            if (usedMethod === 'auto') usedMethod = 'auto (berhasil)';
            displaySource(htmlContent, rawUrl, usedMethod);
        } catch (err) {
            console.error(err);
            showError(err.message, rawUrl);
        }
    }

    async function copySource() {
        if (!lastRawHtml) {
            alert('tidak ada source. ambil source terlebih dahulu.');
            return;
        }
        try {
            await navigator.clipboard.writeText(lastRawHtml);
            alert('source HTML berhasil disalin');
        } catch (e) {
            alert('gagal menyalin: ' + e.message);
        }
    }

    function downloadSource() {
        if (!lastRawHtml) {
            alert('tidak ada konten untuk didownload.');
            return;
        }
        const blob = new Blob([lastRawHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        let fileName = 'source_view.html';
        if (lastFetchedUrl) {
            let domain = lastFetchedUrl.replace(/^https?:\/\//, '').replace(/\/.*$/, '').replace(/[^a-z0-9]/gi, '_');
            fileName = `source_${domain}_${Date.now()}.html`;
        }
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function clearAll() {
        sourceContainer.innerHTML = `<div style="color: #6a7c9e; text-align: center; padding: 40px;">
            bersih. masukkan URL baru.
        </div>`;
        lastRawHtml = '';
        lastFetchedUrl = '';
        resultUrlLabel.innerText = 'URL: -';
    }

    function reRenderCurrentSource() {
        if (lastRawHtml) {
            let final = prettyCheckbox.checked ? prettyPrintHtml(lastRawHtml) : lastRawHtml;
            const escaped = escapeHtml(final);
            sourceContainer.innerHTML = `<pre>${escaped}</pre>`;
        }
    }

    fetchBtn.addEventListener('click', fetchSource);
    copyBtn.addEventListener('click', copySource);
    downloadBtn.addEventListener('click', downloadSource);
    clearBtn.addEventListener('click', clearAll);
    
    targetUrlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') fetchSource();
    });
    
    prettyCheckbox.addEventListener('change', reRenderCurrentSource);
    rawCheckbox.addEventListener('change', reRenderCurrentSource);
</script>
</body>
    </html>
