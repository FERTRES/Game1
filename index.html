<!DOCTYPE html>

        }

        .live-dot {

            margin-right: 0.5rem;

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .url-row {
            padding: 0.75rem 1.5rem;
            background: rgba(15, 12, 41, 0.8);
            border-bottom: 1px solid #8b5cf6;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }

        .url-input {

            border-radius: 40px;
            color: white;
            font-weight: bold;

        .options-bar {

        .panel-tabs {

        .neon-spinner {
            width: 50px;

            margin-bottom: 20px;

        .neon-spinner .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #c084fc;
            border-right-color: #a78bfa;
            animation: spin 0.8s linear infinite;
        }

        .neon-spinner .ring:nth-child(2) {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-top-color: #8b5cf6;
            border-right-color: #7c3aed;
            animation-duration: 0.6s;
            animation-direction: reverse;
        }

        .neon-spinner .ring:nth-child(3) {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            border-top-color: #a78bfa;
            border-left-color: #c084fc;
            animation-duration: 1s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-dots {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .pulse-dots span {
            width: 10px;
            height: 10px;
            background: #c084fc;
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .pulse-dots span:nth-child(1) { animation-delay: 0s; }
        .pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }

        .loading-text {
            color: #c084fc;

            font-family: monospace;
            animation: textGlow 1.5s ease-in-out infinite;

        @keyframes textGlow {

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1a1a2e;
            border: 1px solid #c084fc;
            border-radius: 0.5rem;

            pointer-events: none;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }

        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 3px;

            }
            .url-row {
                flex-direction: column;
            }
            .url-input, .method-select, .fetch-btn {
                width: 100%;
            }
        }

<script>
    // ==================== 43 PROXY LIST ====================
    const PROXY_LIST = [
        "https://cors-anywhere.herokuapp.com/",

        "https://cors-tunnel-6.fly.dev/",
        "https://cors-proxy-vercel.vercel.app/",
        "https://cors-bridge.vercel.app/",
        "https://cors-relay.vercel.app/"
    ];

    // ==================== FETCH METHODS ====================
    async function fetchViaProxy(url, proxyUrl) {
        let fullUrl;
        const needsEncode = proxyUrl.includes('?') || proxyUrl.includes('raw?url=');
        
        if (needsEncode) {
            fullUrl = proxyUrl + encodeURIComponent(url);
        } else {
            const cleanProxy = proxyUrl.endsWith('/') ? proxyUrl.slice(0, -1) : proxyUrl;
            fullUrl = cleanProxy + "/" + url;
        }
        
        const res = await fetch(fullUrl, {
            headers: { 'X-Requested-With': 'XMLHttpRequest', 'Origin': window.location.origin }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let text = await res.text();
        
        if (proxyUrl.includes('allorigins')) {
            try { const parsed = JSON.parse(text); text = parsed.contents || text; } catch(e) {}
        }
        return text;
    }

    async function m_allorigins(url) {
        return await fetchViaProxy(url, "https://api.allorigins.win/raw?url=");
    }

    async function m_corsproxy(url) {
        return await fetchViaProxy(url, "https://corsproxy.io/?");
    }

    async function m_corsa(url) {
        return await fetchViaProxy(url, "https://cors-anywhere.herokuapp.com/");
    }

    async function m_corst(url) {
        return await fetchViaProxy(url, "https://cors.sh/");
    }

    async function m_googlecache(url) {
        const cacheUrl = `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(url)}&strip=1&vwsrc=0`;
        const res = await fetch(cacheUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error('Google cache tidak ditemukan');
        let html = await res.text();
        const match = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
        if (match) return match[1];
        return html;
    }

    async function m_yandex(url) {
        const cacheUrl = `https://cache.yandex.net/caches/navigator?url=${encodeURIComponent(url)}&strip=1`;
        const res = await fetch(cacheUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error('Yandex cache tidak tersedia');
        return await res.text();
    }

    async function m_archive(url) {
        const apiUrl = `https://archive.org/wayback/available?url=${encodeURIComponent(url)}`;
        const meta = await fetch(apiUrl);
        const metaJson = await meta.json();
        if (!metaJson.archived_snapshots?.closest) throw new Error('Tidak ada snapshot di archive.org');
        const snapshotUrl = metaJson.archived_snapshots.closest.url;
        const res = await fetch(snapshotUrl);
        if (!res.ok) throw new Error('gagal mengambil snapshot');
        return await res.text();
    }

    async function m_textise(url) {
        const textiseUrl = `https://textise.iitty.com/?u=${encodeURIComponent(url)}`;
        const res = await fetch(textiseUrl);
        if (!res.ok) throw new Error('Textise gagal');
        let txt = await res.text();
        const match = txt.match(/<div id="content"[^>]*>([\s\S]*?)<\/div>/i);
        if (match && match[1]) return match[1];
        throw new Error('tidak bisa parse textise');
    }

    async function m_jina(url) {
        const jinaUrl = `https://r.jina.ai/${encodeURIComponent(url)}`;
        const res = await fetch(jinaUrl, { headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error(`Jina AI error ${res.status}`);
        return await res.text();
    }

    async function m_whatsmydns(url) {
        const api = `https://www.whatsmydns.net/api/lookup?type=HTML&host=${encodeURIComponent(url)}`;
        const res = await fetch(api);
        if (!res.ok) throw new Error('whatsmydns api error');
        const json = await res.json();
        if (json?.data?.html) return json.data.html;
        throw new Error('no source from whatsmydns');
    }

    async function m_iframe(url) {
        return new Promise((resolve, reject) => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = url;
            iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals';
            let timeout = setTimeout(() => {
                iframe.remove();
                reject(new Error('iframe timeout / CORS block'));
            }, 15000);
            iframe.onload = () => {
                try {
                    let doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc && doc.documentElement) {
                        let html = doc.documentElement.outerHTML;
                        clearTimeout(timeout);
                        iframe.remove();
                        resolve(html);
                    } else {
                        clearTimeout(timeout);
                        iframe.remove();
                        reject(new Error('tidak bisa akses konten iframe (CORS)'));
                    }
                } catch (e) {
                    clearTimeout(timeout);
                    iframe.remove();
                    reject(new Error('iframe cross-origin blocked'));
                }
            };
            iframe.onerror = () => {
                clearTimeout(timeout);
                iframe.remove();
                reject(new Error('iframe gagal load'));
            };
            document.body.appendChild(iframe);
        });
    }

    async function m_scraperapi(url) {
        try {
            return await m_allorigins(url);
        } catch (e) {
            return await m_corsa(url);
        }
    }

    async function m_direct(url) {
        const res = await fetch(url, { mode: 'cors', headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error(`Direct HTTP ${res.status}`);
        return await res.text();
    }

    const methodMap = {
        allorigins: m_allorigins,
        corsproxy: m_corsproxy,
        corsa: m_corsa,
        corst: m_corst,
        googlecache: m_googlecache,
        yandex: m_yandex,
        archive: m_archive,
        textise: m_textise,
        'r.jina': m_jina,
        whatsmydns: m_whatsmydns,
        iframe: m_iframe,
        scraperapi: m_scraperapi,
        direct: m_direct
    };

    async function fetchWithMethod(url, methodName) {
        const fn = methodMap[methodName];
        if (!fn) throw new Error(`metode ${methodName} tidak dikenal`);
        return await fn(url);
    }

    async function fetchAuto(url) {
        let lastError = null;
        for (let i = 0; i < PROXY_LIST.length; i++) {
            const proxy = PROXY_LIST[i];
            const proxyName = proxy.split('/')[2]?.split('.')[0] || proxy.substring(8, 30);
            try {
                addLog(`mencoba proxy ${i+1}/${PROXY_LIST.length}: ${proxyName}`, 'info');
                const html = await fetchViaProxy(url, proxy);
                if (html && html.length > 30) {
                    addLog(`berhasil pakai proxy ${proxyName}`, 'success');
                    return { html, method: `proxy:${proxyName}` };
                }
            } catch (e) {
                lastError = e;
                addLog(`proxy ${proxyName} gagal: ${e.message}`, 'error');
            }
        }
        
        const order = ['allorigins', 'corsproxy', 'corsa', 'corst', 'googlecache', 'yandex', 'archive', 'textise', 'r.jina', 'whatsmydns', 'scraperapi', 'iframe', 'direct'];
        for (const m of order) {
            try {
                addLog(`mencoba fallback method ${m}...`, 'info');
                const html = await fetchWithMethod(url, m);
                if (html && html.length > 30) {
                    addLog(`berhasil pakai fallback ${m}`, 'success');
                    return { html, method: m };
                }
            } catch (e) {
                lastError = e;
                addLog(`fallback ${m} gagal: ${e.message}`, 'error');
            }
        }
        throw lastError || new Error('semua proxy dan metode gagal total');
    }

    async function masterFetch(url) {
        const selected = methodSelect.value;
        if (selected === 'auto') {
            const { html, method } = await fetchAuto(url);
            return { html, method };
        } else {
            const html = await fetchWithMethod(url, selected);
            return { html, method: selected };
        }
    }

    // ==================== UTILITIES ====================
    let currentHtml = "";
    let currentCss = "";
    let currentJs = "";
    let currentFullHtml = "";
    let currentUrl = "";

    const targetUrlInput = document.getElementById('targetUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const methodSelect = document.getElementById('methodSelect');
    const prettyCheckbox = document.getElementById('prettyCheckbox');
    const rawCheckbox = document.getElementById('rawCheckbox');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const clearBtn = document.getElementById('clearBtn');
    const refreshPreviewBtn = document.getElementById('refreshPreviewBtn');
    const openPreviewBtn = document.getElementById('openPreviewBtn');
    const previewFrame = document.getElementById('previewFrame');
    const bytesStatSpan = document.getElementById('bytesStat');
    const clearConsoleBtn = document.getElementById('clearConsole');
    const consoleLogDiv = document.getElementById('consoleLog');

    const htmlEditor = document.getElementById('htmlEditor');
    const cssEditor = document.getElementById('cssEditor');
    const jsEditor = document.getElementById('jsEditor');
    const tabs = document.querySelectorAll('.tab');
    const editorContent = document.getElementById('editorContent');
    const previewPanel = document.getElementById('previewPanel');

    let editorLoadingOverlay = null;
    let previewLoadingOverlay = null;

    function showEditorLoading(show, message = 'FETCHING') {
        if (show) {
            if (editorLoadingOverlay) editorLoadingOverlay.remove();
            editorLoadingOverlay = document.createElement('div');
            editorLoadingOverlay.className = 'loading-overlay';
            editorLoadingOverlay.innerHTML = `
                <div class="neon-spinner">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <div class="pulse-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="loading-text">${message}</div>
            `;
            editorContent.style.position = 'relative';
            editorContent.appendChild(editorLoadingOverlay);
        } else {
            if (editorLoadingOverlay) {
                editorLoadingOverlay.remove();
                editorLoadingOverlay = null;
            }
        }
    }

    function showPreviewLoading(show, message = 'LOADING PREVIEW') {
        if (show) {
            if (previewLoadingOverlay) previewLoadingOverlay.remove();
            previewLoadingOverlay = document.createElement('div');
            previewLoadingOverlay.className = 'preview-loading';
            previewLoadingOverlay.innerHTML = `
                <div class="neon-spinner">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <div class="pulse-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="loading-text">${message}</div>
            `;
            previewPanel.style.position = 'relative';
            previewPanel.appendChild(previewLoadingOverlay);
        } else {
            if (previewLoadingOverlay) {
                previewLoadingOverlay.remove();
                previewLoadingOverlay = null;
            }
        }
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            htmlEditor.style.display = 'none';
            cssEditor.style.display = 'none';
            jsEditor.style.display = 'none';
            
            if (target === 'html') htmlEditor.style.display = 'block';
            if (target === 'css') cssEditor.style.display = 'block';
            if (target === 'js') jsEditor.style.display = 'block';
        });
    });

    function addLog(message, type = 'info') {
        const logLine = document.createElement('div');
        logLine.className = `log-line ${type}`;
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
        logLine.innerHTML = `<span class="log-time">${timeStr}</span> ${message}`;
        consoleLogDiv.appendChild(logLine);
        logLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearConsole() {
        consoleLogDiv.innerHTML = '';
        addLog('Console cleared', 'info');
    }
    clearConsoleBtn.addEventListener('click', clearConsole);

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderColor = isError ? '#f87171' : '#c084fc';
        toast.style.color = isError ? '#f87171' : '#c084fc';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function prettyHtml(html) {
        if (!html) return '';
        if (rawCheckbox.checked) return html;
        let formatted = html.replace(/>\s*</g, '>\n<').replace(/(\n\s*)+/g, '\n');
        let indent = 0;
        let lines = formatted.split('\n');
        let result = [];
        for (let line of lines) {
            let trimmed = line.trim();
            if (trimmed.match(/^<\/[^>]+>/)) indent = Math.max(0, indent - 1);
            let spaces = '  '.repeat(indent);
            result.push(spaces + trimmed);
            if (trimmed.match(/^<[^\/?!][^>]*[^\/]>$/) && !trimmed.match(/<(br|hr|img|input|link|meta|area|base|col|embed|source|track|wbr)/i)) {
                indent++;
            }
        }
        return result.join('\n');
    }

    function extractParts(html) {
        let cleanHtml = html;
        let extractedCss = "";
        let extractedJs = "";
        
        const styleMatch = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
        if (styleMatch) {
            extractedCss = styleMatch[1];
            cleanHtml = cleanHtml.replace(styleMatch[0], '');
        }
        
        const scriptMatch = html.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
        if (scriptMatch) {
            extractedJs = scriptMatch[1];
            cleanHtml = cleanHtml.replace(scriptMatch[0], '');
        }
        
        return { html: cleanHtml, css: extractedCss, js: extractedJs };
    }

    function updatePreview() {
        if (!currentFullHtml) {
            previewFrame.srcdoc = '<html><body style="background:#0f0c29;color:#a78bfa;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace">No content loaded</body></html>';
            return;
        }
        let doc = currentFullHtml;
        if (!doc.toLowerCase().includes('<html')) {
            doc = `<html><head><base href="${currentUrl}"><style>body{background:white;}</style></head><body>${doc}</body></html>`;
        } else {
            doc = doc.replace(/<head/i, `<head><base href="${currentUrl}">`);
        }
        previewFrame.srcdoc = doc;
    }

    function refreshPreview() {
        showPreviewLoading(true, 'REFRESHING');
        setTimeout(() => {
            updatePreview();
            showPreviewLoading(false);
            addLog('Preview refreshed', 'info');
            showToast('Preview refreshed');
        }, 300);
    }

    function openPreviewNewTab() {
        if (currentFullHtml) {
            const blob = new Blob([currentFullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 100);
            addLog('Opened preview in new tab', 'info');
        } else {
            showToast('No content to preview', true);
        }
    }

    function copySource() {
        if (!currentFullHtml) {
            showToast('No content to copy', true);
            return;
        }
        navigator.clipboard.writeText(currentFullHtml);
        showToast('Copied to clipboard');
        addLog('Source copied to clipboard', 'success');
    }

    function downloadSource() {
        if (!currentFullHtml) {
            showToast('No content to download', true);
            return;
        }
        const safeName = currentUrl.replace(/[^a-z0-9]/gi, '_').substring(0, 50);
        const filename = `sourcemirror_${safeName}_${Date.now()}.html`;
        const blob = new Blob([currentFullHtml], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        addLog(`Downloaded: ${filename} (${currentFullHtml.length} bytes)`, 'success');
        showToast(`Downloaded: ${filename}`);
    }

    function clearAll() {
        currentHtml = "";
        currentCss = "";
        currentJs = "";
        currentFullHtml = "";
        currentUrl = "";
        htmlEditor.value = "";
        cssEditor.value = "";
        jsEditor.value = "";
        bytesStatSpan.innerText = "0 BYTES";
        previewFrame.srcdoc = '<html><body style="background:#0f0c29;color:#a78bfa;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace">Cleared</body></html>';
        addLog('All content cleared', 'info');
        showToast('Cleared');
    }

    function displaySource(htmlContent, originalUrl, methodUsed) {
        currentFullHtml = htmlContent;
        currentUrl = originalUrl;
        bytesStatSpan.innerText = `${(htmlContent.length / 1024).toFixed(1)} KB`;
        
        const { html: cleanHtml, css, js } = extractParts(htmlContent);
        currentHtml = cleanHtml;
        currentCss = css;
        currentJs = js;
        
        let finalHtml = prettyCheckbox.checked ? prettyHtml(cleanHtml) : cleanHtml;
        htmlEditor.value = finalHtml;
        cssEditor.value = css;
        jsEditor.value = js;
        
        updatePreview();
        addLog(`SUCCESS: ${htmlContent.length} bytes via ${methodUsed}`, 'success');
        showToast(`Success: ${(htmlContent.length/1024).toFixed(1)} KB via ${methodUsed}`);
    }

    function showError(msg, url) {
        htmlEditor.value = `// ERROR\n// ${msg}\n// URL: ${url}\n// Try another method or URL`;
        cssEditor.value = "";
        jsEditor.value = "";
        previewFrame.srcdoc = `<html><body style="background:#0f0c29;color:#f87171;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace;padding:20px;text-align:center">ERROR: ${escapeHtml(msg)}<br><br>URL: ${escapeHtml(url)}</body></html>`;
        addLog(`FAILED: ${msg}`, 'error');
        showToast(`Failed: ${msg}`, true);
    }

    async function fetchSource() {
        let rawUrl = targetUrlInput.value.trim();
        if (!rawUrl) {
            showError('URL kosong', '');
            return;
        }
        if (!rawUrl.startsWith('http')) rawUrl = 'https://' + rawUrl;
        targetUrlInput.value = rawUrl;
        
        showEditorLoading(true, `FETCHING VIA ${methodSelect.value.toUpperCase()}`);
        showPreviewLoading(true, 'WAITING FOR DATA');
        addLog(`Starting fetch: ${rawUrl}`, 'info');
        
        try {
            const { html, method } = await masterFetch(rawUrl);
            if (!html || html.length < 15) throw new Error('konten terlalu pendek');
            displaySource(html, rawUrl, method);
        } catch (err) {
            showError(err.message, rawUrl);
        } finally {
            showEditorLoading(false);
            setTimeout(() => {
                showPreviewLoading(false);
            }, 500);
        }
    }

    function reRender() {
        if (currentFullHtml) {
            let finalHtml = prettyCheckbox.checked ? prettyHtml(currentHtml) : currentHtml;
            htmlEditor.value = finalHtml;
        }
    }

    fetchBtn.addEventListener('click', fetchSource);
    copyBtn.addEventListener('click', copySource);
    downloadBtn.addEventListener('click', downloadSource);
    clearBtn.addEventListener('click', clearAll);
    refreshPreviewBtn.addEventListener('click', refreshPreview);
    openPreviewBtn.addEventListener('click', openPreviewNewTab);
    targetUrlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') fetchSource(); });
    prettyCheckbox.addEventListener('change', reRender);
    rawCheckbox.addEventListener('change', reRender);

    addLog(`WebGhost Ultimate ready · ${PROXY_LIST.length} PROXY + 14 methods · Dual animation`, 'success');
</script>
