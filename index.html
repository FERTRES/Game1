<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SOURCE MIRROR V4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0a1a 0%, #10102a 100%);
            font-family: 'Inter', 'Courier New', 'Fira Code', monospace;
            padding: 24px;
            min-height: 100vh;
            color: #e2e8ff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid #4f46e5;
        }
        .title h1 {
            font-size: 2rem;
            background: linear-gradient(125deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .title p {
            font-size: 0.7rem;
            color: #8b8ccc;
            margin-top: 5px;
        }
        .badge-group {
            display: flex;
            gap: 12px;
            background: rgba(30, 30, 55, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 22px;
            border-radius: 60px;
            border: 1px solid #4f46e580;
        }
        .badge {
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .led {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 6px #10b981;
            animation: blink 1.2s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .input-card {
            background: rgba(15, 18, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid #4f46e560;
            padding: 20px 28px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
        }
        .url-input {
            flex: 3;
            background: #0c0e1c;
            border: 1px solid #2d2f50;
            border-radius: 60px;
            padding: 14px 24px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: #b9c7ff;
            outline: none;
            transition: 0.2s;
        }
        .url-input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px #8b5cf630;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.7rem;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            background: #252842;
            color: #cbd5ff;
            border: 1px solid #4f46e5;
        }
        .btn-primary {
            background: linear-gradient(95deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.07);
        }
        .btn-outline {
            background: transparent;
        }
        .btn-outline:hover {
            background: #4f46e530;
        }
        .btn-warning {
            border-color: #f97316;
            color: #fdba74;
        }
        .btn-warning:hover {
            background: #f9731620;
        }

        .main-panel {
            background: rgba(10, 12, 25, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            border: 1px solid #4f46e540;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .panel-header {
            padding: 16px 24px;
            background: rgba(0, 0, 0, 0.35);
            border-bottom: 1px solid #2d2f50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .panel-header h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #b7c4ff;
        }
        .mini-btn {
            background: #1a1c32;
            border: 1px solid #3d3f68;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.6rem;
            cursor: pointer;
            color: #bcc6ff;
            transition: 0.15s;
        }
        .mini-btn:hover {
            background: #2d2f50;
        }
        .source-area {
            width: 100%;
            min-height: 620px;
            background: #03050c;
            border: none;
            padding: 24px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            line-height: 1.6;
            color: #dbddff;
            resize: vertical;
            outline: none;
            white-space: pre-wrap;
        }

        .log-panel {
            background: #05070f;
            border-radius: 24px;
            border: 1px solid #2d2f50;
            padding: 14px 22px;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.65rem;
        }
        .log-line {
            padding: 5px 0;
            border-left: 2px solid #3d4068;
            padding-left: 12px;
            margin: 4px 0;
            color: #8f99c0;
        }
        .log-line.success { border-left-color: #10b981; color: #6ee7b7; }
        .log-line.error { border-left-color: #ef4444; color: #fca5a5; }
        .log-line.info { border-left-color: #8b5cf6; color: #c4b5fd; }

        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1e1f3a;
            border-left: 4px solid #10b981;
            border-radius: 40px;
            padding: 10px 24px;
            font-size: 0.8rem;
            z-index: 1000;
            animation: fadeout 2.2s forwards;
        }
        @keyframes fadeout {
            0% { opacity: 0; transform: translateX(40px); }
            15% { opacity: 1; transform: translateX(0); }
            85% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(40px); visibility: hidden; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0e18; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="title">
            <h1>𝗦𝗢𝗨𝗥𝗖𝗘 𝗠𝗜𝗥𝗥𝗢𝗥 𝗩𝟰</h1>
            <p>© By derty V4.00</p>
        </div>
        <div class="badge-group">
            <div class="badge"><span class="led"></span> 53 PROXIES</div>
            <div class="badge" id="proxyName">ROTATOR: active</div>
        </div>
    </div>

    <div class="input-card">
        <input type="text" id="targetUrl" class="url-input" placeholder="https://example.com" value="">
        <button class="btn btn-primary" id="extractBtn">EXTRACT</button>
        <button class="btn btn-warning" id="clearBtn">CLEAR</button>
    </div>

    <div class="main-panel">
        <div class="panel-header">
            <h3>RAW SOURCE CODE</h3>
            <div>
                <button class="mini-btn" id="copyBtn">COPY</button>
                <button class="mini-btn" id="saveBtn">DOWLOAD</button>
            </div>
        </div>
        <textarea class="source-area" id="sourceDisplay" readonly placeholder="/* extracted source will appear here */"></textarea>
    </div>

    <div class="log-panel" id="logContainer">
        <div class="log-line info">>_ source mirror ready</div>
        <div class="log-line info">>_ 53 cors proxies loaded · rotating pool</div>
    </div>
</div>

<script>
    (function(){
        // 53 PROXY LIST
        const PROXY_LIST = [
            'https://api.allorigins.win/raw?url=', 'https://corsproxy.io/?', 'https://api.codetabs.com/v1/proxy?quest=',
            'https://cors-anywhere.herokuapp.com/', 'https://proxy.cors.sh/', 'https://cors-proxy.htmldriven.com/?url=',
            'https://crossorigin.me/', 'https://cors.bridged.cc/', 'https://cors.zebro.id/',
            'https://thingproxy.freeboard.io/fetch/', 'https://cors.eu.org/', 'https://cors-proxy.fermyon.app/',
            'https://cors-relay.vercel.app/', 'https://cors-proxy.cyclic.app/', 'https://cors-proxy-omega.vercel.app/',
            'https://cors-proxy-phi.vercel.app/', 'https://cors-proxy-rust.vercel.app/', 'https://cors-proxy-eight.vercel.app/',
            'https://cors-proxy-ten.vercel.app/', 'https://cors-proxy-xi.vercel.app/', 'https://cors-proxy-alpha.vercel.app/',
            'https://cors-proxy-beta.vercel.app/', 'https://cors-proxy-gamma.vercel.app/', 'https://cors-proxy-delta.vercel.app/',
            'https://cors-proxy-iota.vercel.app/', 'https://cors-proxy-kappa.vercel.app/', 'https://cors-proxy-lambda.vercel.app/',
            'https://cors-proxy-sigma.vercel.app/', 'https://cors-proxy-omicron.vercel.app/', 'https://cors-proxy-upsilon.vercel.app/',
            'https://cors-proxy-psi.vercel.app/', 'https://cors-proxy-epsilon.vercel.app/', 'https://cors-proxy-zeta.vercel.app/',
            'https://cors-proxy-eta.vercel.app/', 'https://cors-proxy-theta.vercel.app/', 'https://cors-proxy-mu.vercel.app/',
            'https://cors-proxy-nu.vercel.app/', 'https://cors-proxy-xi2.vercel.app/', 'https://cors-proxy-omicron2.vercel.app/',
            'https://cors-proxy-pi.vercel.app/', 'https://cors-proxy-rho.vercel.app/', 'https://cors-proxy-tau.vercel.app/',
            'https://cors-proxy-chi.vercel.app/', 'https://cors-proxy-phi2.vercel.app/', 'https://cors-proxy-psi2.vercel.app/',
            'https://cors-proxy-omega2.vercel.app/', 'https://cors-proxy-aleph.vercel.app/', 'https://cors-proxy-bet.vercel.app/',
            'https://cors-proxy-gimel.vercel.app/', 'https://cors-proxy-dalet.vercel.app/', 'https://cors-proxy-he.vercel.app/',
            'https://cors-proxy-vav.vercel.app/', 'https://cors-proxy-zayin.vercel.app/'
        ];

        let proxyIdx = 0;
        let storedHtml = '';
        let storedBaseUrl = '';

        const urlInput = document.getElementById('targetUrl');
        const extractBtn = document.getElementById('extractBtn');
        const clearBtn = document.getElementById('clearBtn');
        const sourceDisplay = document.getElementById('sourceDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const saveBtn = document.getElementById('saveBtn');
        const proxyNameSpan = document.getElementById('proxyName');
        const logContainer = document.getElementById('logContainer');

        function addLog(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] >_ ${msg}`;
            logContainer.appendChild(line);
            line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            while(logContainer.children.length > 50) logContainer.removeChild(logContainer.firstChild);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2100);
        }

        function updateProxyDisplay() {
            const proxy = PROXY_LIST[proxyIdx % PROXY_LIST.length];
            const short = proxy.replace('https://', '').split('/')[0].slice(0, 28);
            proxyNameSpan.innerText = `PROXY: ${short}`;
        }

        async function fetchWithProxy(url) {
            for(let i = 0; i < PROXY_LIST.length; i++) {
                const proxy = PROXY_LIST[proxyIdx % PROXY_LIST.length];
                proxyIdx = (proxyIdx + 1) % PROXY_LIST.length;
                updateProxyDisplay();
                const proxyUrl = proxy + encodeURIComponent(url);
                const shortName = proxy.replace('https://', '').split('/')[0].slice(0, 35);
                addLog(`trying ${shortName}`, 'info');
                try {
                    const ctrl = new AbortController();
                    const tid = setTimeout(() => ctrl.abort(), 12000);
                    const res = await fetch(proxyUrl, { signal: ctrl.signal });
                    clearTimeout(tid);
                    if(res.ok) {
                        const html = await res.text();
                        addLog(`success via ${shortName} (${html.length} chars)`, 'success');
                        return html;
                    } else {
                        addLog(`${shortName} -> http ${res.status}`, 'error');
                    }
                } catch(e) {
                    addLog(`${shortName} error: ${e.message.slice(0, 50)}`, 'error');
                }
            }
            addLog(`all proxies failed, trying direct`, 'info');
            try {
                const direct = await fetch(url, { signal: AbortSignal.timeout(10000) });
                if(direct.ok) {
                    addLog(`direct fetch ok`, 'success');
                    return await direct.text();
                }
            } catch(e) {
                addLog(`direct failed: ${e.message}`, 'error');
            }
            throw new Error(`All ${PROXY_LIST.length} proxies failed`);
        }

        async function extract() {
            let target = urlInput.value.trim();
            if(!target) {
                addLog('enter a url', 'error');
                return;
            }
            if(!target.startsWith('http')) target = 'https://' + target;
            urlInput.value = target;

            sourceDisplay.value = '// extracting via proxy rotator...\n// please wait\n// this may take a few seconds';
            extractBtn.disabled = true;
            extractBtn.textContent = 'EXTRACTING...';

            addLog(`target: ${target}`, 'info');
            addLog(`proxies: ${PROXY_LIST.length} nodes`, 'info');

            try {
                const html = await fetchWithProxy(target);
                storedHtml = html;
                storedBaseUrl = target;
                sourceDisplay.value = html;
                addLog(`captured ${html.length.toLocaleString()} bytes`, 'success');
                showToast('source extracted');
            } catch(err) {
                addLog(`error: ${err.message}`, 'error');
                sourceDisplay.value = `// EXTRACTION FAILED\n// ${err.message}\n// target: ${target}\n\n// possible reasons:\n// - target blocked CORS\n// - target down\n// - all proxies failed`;
                showToast('extract failed');
            } finally {
                extractBtn.disabled = false;
                extractBtn.textContent = 'EXTRACT';
            }
        }

        function clearAll() {
            storedHtml = '';
            storedBaseUrl = '';
            sourceDisplay.value = '';
            urlInput.value = '';
            addLog('session cleared', 'info');
            showToast('cleared');
        }

        function copySource() {
            if(!sourceDisplay.value || sourceDisplay.value.includes('extracting')) {
                showToast('no source to copy');
                return;
            }
            sourceDisplay.select();
            document.execCommand('copy');
            showToast('source copied to clipboard');
            addLog('copied to clipboard', 'success');
        }

        function saveHtml() {
            if(!storedHtml) {
                showToast('no html to save');
                return;
            }
            const blob = new Blob([storedHtml], {type: 'text/html'});
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            let name = 'source_mirror.html';
            try { name = new URL(storedBaseUrl).hostname + '_source.html'; } catch(e) {}
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
            addLog(`saved: ${name}`, 'success');
            showToast('html saved');
        }

        extractBtn.addEventListener('click', extract);
        clearBtn.addEventListener('click', clearAll);
        copyBtn.addEventListener('click', copySource);
        saveBtn.addEventListener('click', saveHtml);
        urlInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') extract(); });

        updateProxyDisplay();
        addLog(`ready · ${PROXY_LIST.length} proxies loaded`, 'success');
    })();
</script>
</body>
    </html>
