<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SOURCE MIRROR V7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Courier New', 'Fira Code', monospace;
            overflow: hidden;
        }

        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #0a0a0f;
        }

        .header-bar {
            background: rgba(15, 12, 41, 0.95);
            border-bottom: 1px solid #8b5cf6;
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header-left h1 {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-left span {
            font-size: 0.7rem;
            color: #8b5cf6;
            margin-left: 0.5rem;
        }

        .header-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .stat-chip {
            background: linear-gradient(135deg, #3b82f620, #a855f720);
            border: 1px solid #8b5cf6;
            padding: 0.3rem 0.8rem;
            border-radius: 0.3rem;
            font-size: 0.75rem;
            font-family: monospace;
            color: #c084fc;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            display: inline-block;
            margin-right: 0.4rem;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .url-row {
            padding: 0.75rem 1.5rem;
            background: rgba(15, 12, 41, 0.8);
            border-bottom: 1px solid #8b5cf6;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }

        .url-input {
            flex: 2;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8b5cf6;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            color: #ddd6fe;
            font-family: monospace;
            font-size: 0.85rem;
            outline: none;
        }

        .url-input:focus {
            border-color: #c084fc;
            box-shadow: 0 0 8px rgba(192, 132, 252, 0.3);
        }

        .method-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #8b5cf6;
            border-radius: 40px;
            padding: 0.7rem 1rem;
            color: #ddd6fe;
            font-family: monospace;
            font-size: 0.8rem;
            cursor: pointer;
            min-width: 150px;
        }

        .fetch-btn {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .fetch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .options-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            padding: 0.5rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid #8b5cf6;
            flex-shrink: 0;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #c4b5fd;
        }

        .main-panels {
            flex: 1;
            display: flex;
            min-height: 0;
            gap: 1px;
            background: #2a1a4a;
        }

        .editor-panel {
            flex: 1;
            min-width: 0;
            background: rgba(15, 12, 41, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
        }

        .panel-tabs {
            display: flex;
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid #8b5cf6;
            padding-left: 0.8rem;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .tab-group {
            display: flex;
        }

        .tab {
            padding: 0.6rem 1.3rem;
            font-size: 0.75rem;
            font-family: monospace;
            color: #8b5cf6;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: #c084fc;
            border-bottom-color: #c084fc;
        }

        .tab:hover:not(.active) {
            color: #a78bfa;
            background: rgba(139, 92, 246, 0.1);
        }

        .action-buttons {
            display: flex;
            gap: 0.6rem;
            margin-right: 1rem;
        }

        .small-btn {
            background: rgba(109, 40, 217, 0.5);
            border: 1px solid #8b5cf6;
            padding: 0.35rem 0.9rem;
            border-radius: 30px;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: monospace;
            color: #ddd6fe;
            transition: 0.2s;
        }

        .small-btn:hover {
            background: #7c3aed;
            border-color: #c084fc;
        }

        .editor-content {
            flex: 1;
            overflow: auto;
            padding: 0.8rem;
            min-height: 0;
            position: relative;
        }

        .code-area {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            color: #ddd6fe;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            white-space: pre-wrap;
            overflow: auto;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 12, 41, 0.9);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            border-radius: 12px;
        }

        .neon-spinner {
            width: 50px;
            height: 50px;
            position: relative;
            margin-bottom: 20px;
        }

        .neon-spinner .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #c084fc;
            border-right-color: #a78bfa;
            animation: spin 0.8s linear infinite;
        }

        .neon-spinner .ring:nth-child(2) {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-top-color: #8b5cf6;
            border-right-color: #7c3aed;
            animation-duration: 0.6s;
            animation-direction: reverse;
        }

        .neon-spinner .ring:nth-child(3) {
            width: 45%;
            height: 45%;
            top: 27.5%;
            left: 27.5%;
            border-top-color: #a78bfa;
            border-left-color: #c084fc;
            animation-duration: 1s;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-dots {
            display: flex;
            gap: 12px;
            margin: 20px 0;
        }

        .pulse-dots span {
            width: 10px;
            height: 10px;
            background: #c084fc;
            border-radius: 50%;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .pulse-dots span:nth-child(1) { animation-delay: 0s; }
        .pulse-dots span:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        .loading-text {
            color: #c084fc;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-family: monospace;
            animation: textGlow 1.5s ease-in-out infinite;
        }

        @keyframes textGlow {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 5px #c084fc; }
            50% { opacity: 1; text-shadow: 0 0 15px #c084fc; }
        }

        .preview-panel {
            flex: 1;
            min-width: 0;
            background: rgba(15, 12, 41, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .preview-header {
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid #8b5cf6;
            padding: 0.6rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .preview-title {
            font-size: 0.75rem;
            font-family: monospace;
            color: #a78bfa;
        }

        .preview-frame {
            flex: 1;
            background: #0f0c29;
            border: none;
            width: 100%;
            min-height: 0;
        }

        .preview-loading {
            position: absolute;
            top: 45px;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 12, 41, 0.95);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .console-panel {
            flex-shrink: 0;
            height: 200px;
            background: rgba(15, 12, 41, 0.8);
            border-top: 1px solid #8b5cf6;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid #8b5cf6;
            padding: 0.4rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .console-title {
            font-size: 0.7rem;
            font-family: monospace;
            color: #8b5cf6;
        }

        .console-clear {
            background: transparent;
            border: 1px solid #8b5cf6;
            color: #8b5cf6;
            padding: 0.2rem 0.6rem;
            border-radius: 0.25rem;
            font-size: 0.65rem;
            cursor: pointer;
        }

        .console-clear:hover {
            border-color: #c084fc;
            color: #c084fc;
        }

        .console-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 1rem;
            font-family: monospace;
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.3);
        }

        .log-line {
            color: #8b5cf6;
            margin-bottom: 0.2rem;
            border-left: 2px solid transparent;
            padding-left: 0.5rem;
        }

        .log-line.info {
            color: #a78bfa;
            border-left-color: #a78bfa;
        }

        .log-line.error {
            color: #f87171;
            border-left-color: #f87171;
        }

        .log-line.success {
            color: #c084fc;
            border-left-color: #c084fc;
        }

        .log-time {
            color: #6a6a8a;
            margin-right: 0.6rem;
        }

        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            background: #1a1a2e;
            border: 1px solid #c084fc;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: #c084fc;
            font-family: monospace;
            z-index: 1000;
            animation: slideInRight 0.3s ease, fadeOut 0.3s ease 1.7s forwards;
            pointer-events: none;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0f;
        }

        ::-webkit-scrollbar-thumb {
            background: #8b5cf6;
            border-radius: 3px;
        }

        @media (max-width: 900px) {
            .main-panels {
                flex-direction: column;
            }
            .url-row {
                flex-direction: column;
            }
            .url-input, .method-select, .fetch-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header-bar">
        <div class="header-left">
            <h1>𝗦𝗢𝗨𝗥𝗖𝗘 𝗠𝗜𝗥𝗥𝗢𝗥 𝗩𝟳<span>©BY DERTY</span></h1>
        </div>
        <div class="header-right">
            <div class="stat-chip"><span class="live-dot"></span>ONLINE</div>
            <div class="stat-chip" id="bytesStat">0 BYTES</div>
        </div>
    </div>

    <div class="url-row">
        <input type="text" id="targetUrl" class="url-input" placeholder="https://example.com" value="">
        <select id="methodSelect" class="method-select">
            <option value="auto">AUTO</option>
            <option value="allorigins">AllOrigins</option>
            <option value="corsproxy">CORSProxy.io</option>
            <option value="corsa">CORS Anywhere</option>
            <option value="corst">cors.sh</option>
            <option value="googlecache">Google Cache</option>
            <option value="yandex">Yandex Cache</option>
            <option value="archive">Archive.org</option>
            <option value="textise">Textise</option>
            <option value="r.jina">Jina Reader</option>
            <option value="whatsmydns">Whatsmydns</option>
            <option value="iframe">Iframe Extract</option>
            <option value="scraperapi">ScraperAPI</option>
            <option value="direct">Direct Fetch</option>
        </select>
        <button class="fetch-btn" id="fetchBtn">EXTRACK</button>
    </div>

    <div class="options-bar">
        <label class="checkbox-label">
            <input type="checkbox" id="prettyCheckbox" checked> Pretty print
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="rawCheckbox"> Raw response
        </label>
    </div>

    <div class="main-panels">
        <div class="editor-panel" id="editorPanel">
            <div class="panel-tabs">
                <div class="tab-group">
                    <button class="tab active" data-tab="html">HTML</button>
                    <button class="tab" data-tab="css">CSS</button>
                    <button class="tab" data-tab="js">JS</button>
                </div>
                <div class="action-buttons">
                    <button id="copyBtn" class="small-btn">COPY</button>
                    <button id="downloadBtn" class="small-btn">DOWNLOAD</button>
                    <button id="clearBtn" class="small-btn">CLEAR</button>
                </div>
            </div>
            <div class="editor-content" id="editorContent">
                <textarea id="htmlEditor" class="code-area" placeholder="HTML source will appear here after fetch"></textarea>
                <textarea id="cssEditor" class="code-area" style="display: none;" placeholder="CSS will appear here"></textarea>
                <textarea id="jsEditor" class="code-area" style="display: none;" placeholder="JavaScript will appear here"></textarea>
            </div>
        </div>

        <div class="preview-panel" id="previewPanel">
            <div class="preview-header">
                <div class="preview-title">LIVE PREVIEW</div>
                <div class="action-buttons">
                    <button id="refreshPreviewBtn" class="small-btn">REFRESH</button>
                    <button id="openPreviewBtn" class="small-btn">NEW TAB</button>
                </div>
            </div>
            <iframe id="previewFrame" class="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>

    <div class="console-panel">
        <div class="console-header">
            <div class="console-title">[ CONSOLE LOG ]</div>
            <button class="console-clear" id="clearConsole">CLEAR</button>
        </div>
        <div class="console-content" id="consoleLog">
            <div class="log-line info"><span class="log-time">[INIT]</span> SOURCE MIRROR 1500 PROXY ready</div>
            <div class="log-line info"><span class="log-time">[INIT]</span> 1514 routes online</div>
            <div class="log-line info"><span class="log-time">[INIT]</span> Enter URL and click FETCH</div>
        </div>
    </div>
</div>

<script>
    // ==================== 1500 PROXY LIST GENERATOR ====================
    const generateProxyList = () => {
        const baseProxies = [
            "https://cors-anywhere.herokuapp.com/", "https://api.allorigins.win/raw?url=", "https://corsproxy.io/?",
            "https://proxy.cors.sh/", "https://cors-proxy.htmldriven.com/?url=", "https://thingproxy.freeboard.io/fetch/",
            "https://cors-escape.herokuapp.com/", "https://blooming-shelf-80934.herokuapp.com/", "https://gentle-badlands-68598.herokuapp.com/",
            "https://shielded-basin-18853.herokuapp.com/", "https://cors-bypass.herokuapp.com/", "https://cors.bridged.cc/",
            "https://cors.eu.org/", "https://crossorigin.me/", "https://cors.evenfast.xyz/", "https://proxy.kodep.xyz/?url=",
            "https://cors.isomorphic.xyz/", "https://cors.isthe.link/", "https://proxy.cors.workers.dev/", "https://cors-proxy.cyclic.app/"
        ];
        
        const platforms = [
            'onrender.com', 'vercel.app', 'netlify.app', 'herokuapp.com', 'fly.dev', 'cyclic.app', 'koyeb.app', 
            'deno.dev', 'workers.dev', 'up.railway.app', 'replit.app', 'glitch.me', 'render.com', 'cyclic.sh', 
            'zeabur.app', 'koyeb.com', 'cloudflare.dev', 'pages.dev', 'firebaseapp.com', 'web.app', 
            'azurewebsites.net', 'digitalocean.app', 'linodeapp.com', 'gigalixirapp.com', 'heroku.com'
        ];
        
        const names = [
            'cors-proxy', 'cors-anywhere', 'cors-bridge', 'cors-relay', 'cors-gateway', 'cors-tunnel', 
            'cors-bypass', 'cors-unlimited', 'cors-fast', 'cors-express', 'cors-proxy-1', 'cors-proxy-2', 
            'cors-proxy-3', 'cors-anywhere-1', 'cors-anywhere-2', 'cors-anywhere-3', 'cors-bridge-1', 
            'cors-bridge-2', 'cors-relay-1', 'cors-relay-2', 'proxy-cors', 'cors-api', 'cors-free', 
            'cors-global', 'cors-mirror', 'cors-turbo', 'cors-ultra', 'cors-mega', 'cors-super', 'cors-max'
        ];
        
        const proxies = [...baseProxies];
        
        for(let i = 1; i <= 1480; i++) {
            const platform = platforms[i % platforms.length];
            const name = names[i % names.length];
            const num = Math.floor(i / 3) + 1;
            proxies.push(`https://${name}-${num}.${platform}/`);
            proxies.push(`https://${name}-proxy-${num}.${platform}/`);
        }
        
        return [...new Set(proxies)].slice(0, 1500);
    };
    
    const PROXY_LIST = generateProxyList();

    // ==================== FETCH FUNCTIONS ====================
    async function fetchViaProxy(url, proxyUrl) {
        let fullUrl;
        const needsEncode = proxyUrl.includes('?') || proxyUrl.includes('raw?url=') || proxyUrl.includes('fetch/');
        
        if (needsEncode) {
            fullUrl = proxyUrl + encodeURIComponent(url);
        } else {
            const cleanProxy = proxyUrl.endsWith('/') ? proxyUrl.slice(0, -1) : proxyUrl;
            fullUrl = cleanProxy + "/" + url;
        }
        
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);
        
        try {
            const res = await fetch(fullUrl, {
                headers: { 'X-Requested-With': 'XMLHttpRequest', 'Origin': location.origin },
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            let text = await res.text();
            if (proxyUrl.includes('allorigins')) {
                try { const p = JSON.parse(text); text = p.contents || text; } catch(e) {}
            }
            if (text.length < 15) throw new Error('Content too short');
            return text;
        } catch(e) {
            clearTimeout(timeoutId);
            throw e;
        }
    }

    async function m_allorigins(u) { return fetchViaProxy(u, "https://api.allorigins.win/raw?url="); }
    async function m_corsproxy(u) { return fetchViaProxy(u, "https://corsproxy.io/?"); }
    async function m_corsa(u) { return fetchViaProxy(u, "https://cors-anywhere.herokuapp.com/"); }
    async function m_corst(u) { return fetchViaProxy(u, "https://cors.sh/"); }
    
    async function m_googlecache(u) {
        const cacheUrl = `https://webcache.googleusercontent.com/search?q=cache:${encodeURIComponent(u)}&strip=1&vwsrc=0`;
        const res = await fetch(cacheUrl);
        if (!res.ok) throw new Error('Google cache tidak ditemukan');
        let html = await res.text();
        const match = html.match(/<pre[^>]*>([\s\S]*?)<\/pre>/i);
        return match ? match[1] : html;
    }

    async function m_yandex(u) {
        const cacheUrl = `https://cache.yandex.net/caches/navigator?url=${encodeURIComponent(u)}&strip=1`;
        const res = await fetch(cacheUrl);
        if (!res.ok) throw new Error('Yandex cache tidak tersedia');
        return await res.text();
    }

    async function m_archive(u) {
        const apiUrl = `https://archive.org/wayback/available?url=${encodeURIComponent(u)}`;
        const meta = await fetch(apiUrl);
        const metaJson = await meta.json();
        if (!metaJson.archived_snapshots?.closest) throw new Error('Tidak ada snapshot');
        const res = await fetch(metaJson.archived_snapshots.closest.url);
        return await res.text();
    }

    async function m_textise(u) {
        const textiseUrl = `https://textise.iitty.com/?u=${encodeURIComponent(u)}`;
        const res = await fetch(textiseUrl);
        let txt = await res.text();
        const match = txt.match(/<div id="content"[^>]*>([\s\S]*?)<\/div>/i);
        if (match && match[1]) return match[1];
        throw new Error('tidak bisa parse textise');
    }

    async function m_jina(u) {
        const jinaUrl = `https://r.jina.ai/${encodeURIComponent(u)}`;
        const res = await fetch(jinaUrl);
        if (!res.ok) throw new Error(`Jina error ${res.status}`);
        return await res.text();
    }

    async function m_whatsmydns(u) {
        const api = `https://www.whatsmydns.net/api/lookup?type=HTML&host=${encodeURIComponent(u)}`;
        const res = await fetch(api);
        const json = await res.json();
        if (json?.data?.html) return json.data.html;
        throw new Error('no source');
    }

    async function m_iframe(u) {
        return new Promise((resolve, reject) => {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.src = u;
            iframe.sandbox = 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals';
            let timeout = setTimeout(() => {
                iframe.remove();
                reject(new Error('iframe timeout / CORS block'));
            }, 10000);
            iframe.onload = () => {
                try {
                    let doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (doc && doc.documentElement) {
                        let html = doc.documentElement.outerHTML;
                        clearTimeout(timeout);
                        iframe.remove();
                        resolve(html);
                    } else {
                        clearTimeout(timeout);
                        iframe.remove();
                        reject(new Error('tidak bisa akses konten iframe (CORS)'));
                    }
                } catch (e) {
                    clearTimeout(timeout);
                    iframe.remove();
                    reject(new Error('iframe cross-origin blocked'));
                }
            };
            iframe.onerror = () => {
                clearTimeout(timeout);
                iframe.remove();
                reject(new Error('iframe gagal load'));
            };
            document.body.appendChild(iframe);
        });
    }

    async function m_scraperapi(u) { return m_allorigins(u); }
    async function m_direct(u) {
        const res = await fetch(u, { mode: 'cors', headers: { 'User-Agent': 'Mozilla/5.0' } });
        if (!res.ok) throw new Error(`Direct HTTP ${res.status}`);
        return await res.text();
    }

    const methodMap = {
        allorigins: m_allorigins, corsproxy: m_corsproxy, corsa: m_corsa, corst: m_corst,
        googlecache: m_googlecache, yandex: m_yandex, archive: m_archive, textise: m_textise,
        'r.jina': m_jina, whatsmydns: m_whatsmydns, iframe: m_iframe, scraperapi: m_scraperapi, direct: m_direct
    };

    async function fetchAuto(url) {
        let lastError = null;
        
        for(let i = 0; i < PROXY_LIST.length; i++) {
            const proxy = PROXY_LIST[i];
            const proxyName = proxy.split('/')[2]?.split('.')[0] || proxy.substring(8, 25);
            
            try {
                if(i % 100 === 0) addLog(`Scanning proxy ${i+1}/${PROXY_LIST.length}...`, 'info');
                const html = await fetchViaProxy(url, proxy);
                if(html && html.length > 30) {
                    addLog(`✓ SUCCESS via ${proxyName} (${i+1}/${PROXY_LIST.length})`, 'success');
                    return { html, method: `proxy:${proxyName}` };
                }
            } catch(e) {
                lastError = e;
            }
        }
        
        for(const [key, fn] of Object.entries(methodMap)) {
            try {
                addLog(`Fallback method: ${key}`, 'info');
                const html = await fn(url);
                if(html && html.length > 30) {
                    addLog(`✓ SUCCESS via fallback ${key}`, 'success');
                    return { html, method: key };
                }
            } catch(e) {
                lastError = e;
            }
        }
        
        throw lastError || new Error('All 1500 proxies + 14 methods failed');
    }

    async function masterFetch(url) {
        if(methodSelect.value === 'auto') {
            return await fetchAuto(url);
        } else {
            const html = await methodMap[methodSelect.value](url);
            return { html, method: methodSelect.value };
        }
    }

    // ==================== UI UTILITIES ====================
    let currentFullHtml = "", currentUrl = "", currentHtml = "", currentCss = "", currentJs = "";
    
    const targetUrlInput = document.getElementById('targetUrl');
    const fetchBtn = document.getElementById('fetchBtn');
    const methodSelect = document.getElementById('methodSelect');
    const prettyCheckbox = document.getElementById('prettyCheckbox');
    const rawCheckbox = document.getElementById('rawCheckbox');
    const previewFrame = document.getElementById('previewFrame');
    const bytesStatSpan = document.getElementById('bytesStat');
    const consoleLogDiv = document.getElementById('consoleLog');
    const htmlEditor = document.getElementById('htmlEditor');
    const cssEditor = document.getElementById('cssEditor');
    const jsEditor = document.getElementById('jsEditor');
    const tabs = document.querySelectorAll('.tab');
    const editorContent = document.getElementById('editorContent');
    const previewPanel = document.getElementById('previewPanel');
    
    let editorLoadingOverlay = null;
    let previewLoadingOverlay = null;

    function showEditorLoading(show, message = 'FETCHING') {
        if(show) {
            if(editorLoadingOverlay) editorLoadingOverlay.remove();
            editorLoadingOverlay = document.createElement('div');
            editorLoadingOverlay.className = 'loading-overlay';
            editorLoadingOverlay.innerHTML = `
                <div class="neon-spinner">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <div class="pulse-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="loading-text">${message}</div>
            `;
            editorContent.style.position = 'relative';
            editorContent.appendChild(editorLoadingOverlay);
        } else {
            if(editorLoadingOverlay) {
                editorLoadingOverlay.remove();
                editorLoadingOverlay = null;
            }
        }
    }

    function showPreviewLoading(show, message = 'LOADING PREVIEW') {
        if(show) {
            if(previewLoadingOverlay) previewLoadingOverlay.remove();
            previewLoadingOverlay = document.createElement('div');
            previewLoadingOverlay.className = 'preview-loading';
            previewLoadingOverlay.innerHTML = `
                <div class="neon-spinner">
                    <div class="ring"></div>
                    <div class="ring"></div>
                    <div class="ring"></div>
                </div>
                <div class="pulse-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <div class="loading-text">${message}</div>
            `;
            previewPanel.style.position = 'relative';
            previewPanel.appendChild(previewLoadingOverlay);
        } else {
            if(previewLoadingOverlay) {
                previewLoadingOverlay.remove();
                previewLoadingOverlay = null;
            }
        }
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.getAttribute('data-tab');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            htmlEditor.style.display = 'none';
            cssEditor.style.display = 'none';
            jsEditor.style.display = 'none';
            
            if(target === 'html') htmlEditor.style.display = 'block';
            if(target === 'css') cssEditor.style.display = 'block';
            if(target === 'js') jsEditor.style.display = 'block';
        });
    });

    function addLog(message, type = 'info') {
        const logLine = document.createElement('div');
        logLine.className = `log-line ${type}`;
        const now = new Date();
        const timeStr = `[${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}]`;
        logLine.innerHTML = `<span class="log-time">${timeStr}</span> ${message}`;
        consoleLogDiv.appendChild(logLine);
        logLine.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearConsole() {
        consoleLogDiv.innerHTML = '';
        addLog('Console cleared', 'info');
    }
    document.getElementById('clearConsole').addEventListener('click', clearConsole);

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderColor = isError ? '#f87171' : '#c084fc';
        toast.style.color = isError ? '#f87171' : '#c084fc';
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function prettyHtml(html) {
        if(!html) return '';
        if(rawCheckbox.checked) return html;
        let formatted = html.replace(/>\s*</g, '>\n<').replace(/(\n\s*)+/g, '\n');
        let indent = 0;
        let lines = formatted.split('\n');
        let result = [];
        for(let line of lines) {
            let trimmed = line.trim();
            if(trimmed.match(/^<\/[^>]+>/)) indent = Math.max(0, indent - 1);
            let spaces = '  '.repeat(indent);
            result.push(spaces + trimmed);
            if(trimmed.match(/^<[^\/?!][^>]*[^\/]>$/) && !trimmed.match(/<(br|hr|img|input|link|meta|area|base|col|embed|source|track|wbr)/i)) {
                indent++;
            }
        }
        return result.join('\n');
    }

    function extractParts(html) {
        let cleanHtml = html;
        let extractedCss = "";
        let extractedJs = "";
        
        const styleMatch = html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);
        if(styleMatch) {
            extractedCss = styleMatch[1];
            cleanHtml = cleanHtml.replace(styleMatch[0], '');
        }
        
        const scriptMatch = html.match(/<script[^>]*>([\s\S]*?)<\/script>/i);
        if(scriptMatch) {
            extractedJs = scriptMatch[1];
            cleanHtml = cleanHtml.replace(scriptMatch[0], '');
        }
        
        return { html: cleanHtml, css: extractedCss, js: extractedJs };
    }

    function updatePreview() {
        if(!currentFullHtml) {
            previewFrame.srcdoc = '<html><body style="background:#0f0c29;color:#a78bfa;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace">No content loaded</body></html>';
            return;
        }
        let doc = currentFullHtml;
        if(!doc.toLowerCase().includes('<html')) {
            doc = `<html><head><base href="${currentUrl}"><style>body{background:white;}</style></head><body>${doc}</body></html>`;
        } else {
            doc = doc.replace(/<head/i, `<head><base href="${currentUrl}">`);
        }
        previewFrame.srcdoc = doc;
    }

    function refreshPreview() {
        showPreviewLoading(true, 'REFRESHING');
        setTimeout(() => {
            updatePreview();
            showPreviewLoading(false);
            addLog('Preview refreshed', 'info');
            showToast('Preview refreshed');
        }, 300);
    }

    function openPreviewNewTab() {
        if(currentFullHtml) {
            const blob = new Blob([currentFullHtml], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
            setTimeout(() => URL.revokeObjectURL(url), 100);
            addLog('Opened preview in new tab', 'info');
        } else {
            showToast('No content to preview', true);
        }
    }

    function copySource() {
        if(!currentFullHtml) {
            showToast('No content to copy', true);
            return;
        }
        navigator.clipboard.writeText(currentFullHtml);
        showToast('Copied to clipboard');
        addLog('Source copied to clipboard', 'success');
    }

    function downloadSource() {
        if(!currentFullHtml) {
            showToast('No content to download', true);
            return;
        }
        const safeName = currentUrl.replace(/[^a-z0-9]/gi, '_').substring(0, 50);
        const filename = `sourcemirror_${safeName}_${Date.now()}.html`;
        const blob = new Blob([currentFullHtml], { type: 'text/html' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
        addLog(`Downloaded: ${filename} (${currentFullHtml.length} bytes)`, 'success');
        showToast(`Downloaded: ${filename}`);
    }

    function clearAll() {
        currentFullHtml = "";
        currentUrl = "";
        currentHtml = "";
        currentCss = "";
        currentJs = "";
        htmlEditor.value = "";
        cssEditor.value = "";
        jsEditor.value = "";
        bytesStatSpan.innerText = "0 BYTES";
        previewFrame.srcdoc = '<html><body style="background:#0f0c29;color:#a78bfa;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace">Cleared</body></html>';
        addLog('All content cleared', 'info');
        showToast('Cleared');
    }

    function displaySource(htmlContent, originalUrl, methodUsed) {
        currentFullHtml = htmlContent;
        currentUrl = originalUrl;
        bytesStatSpan.innerText = `${(htmlContent.length / 1024).toFixed(1)} KB`;
        
        const { html: cleanHtml, css, js } = extractParts(htmlContent);
        currentHtml = cleanHtml;
        currentCss = css;
        currentJs = js;
        
        let finalHtml = prettyCheckbox.checked ? prettyHtml(cleanHtml) : cleanHtml;
        htmlEditor.value = finalHtml;
        cssEditor.value = css;
        jsEditor.value = js;
        
        updatePreview();
        addLog(`SUCCESS: ${htmlContent.length} bytes via ${methodUsed.substring(0, 40)}`, 'success');
        showToast(`Success: ${(htmlContent.length/1024).toFixed(1)} KB`);
    }

    function showError(msg, url) {
        htmlEditor.value = `// ERROR\n// ${msg}\n// URL: ${url}\n// Try another method or URL`;
        cssEditor.value = "";
        jsEditor.value = "";
        previewFrame.srcdoc = `<html><body style="background:#0f0c29;color:#f87171;display:flex;align-items:center;justify-content:center;height:100%;font-family:monospace;padding:20px;text-align:center">ERROR: ${escapeHtml(msg)}<br><br>URL: ${escapeHtml(url)}</body></html>`;
        addLog(`FAILED: ${msg}`, 'error');
        showToast(`Failed: ${msg}`, true);
    }

    async function fetchSource() {
        let rawUrl = targetUrlInput.value.trim();
        if(!rawUrl) {
            showError('URL kosong', '');
            return;
        }
        if(!rawUrl.startsWith('http')) rawUrl = 'https://' + rawUrl;
        targetUrlInput.value = rawUrl;
        
        showEditorLoading(true, `FETCHING VIA ${methodSelect.value.toUpperCase()}`);
        showPreviewLoading(true, 'WAITING FOR DATA');
        addLog(`STARTING FETCH: ${rawUrl}`, 'info');
        addLog(`Total routes: ${PROXY_LIST.length} proxies + 14 methods = ${PROXY_LIST.length + 14}`, 'info');
        
        try {
            const { html, method } = await masterFetch(rawUrl);
            if(!html || html.length < 15) throw new Error('Content too short');
            displaySource(html, rawUrl, method);
        } catch(err) {
            showError(err.message, rawUrl);
        } finally {
            showEditorLoading(false);
            setTimeout(() => showPreviewLoading(false), 500);
        }
    }

    function reRender() {
        if(currentFullHtml) {
            let finalHtml = prettyCheckbox.checked ? prettyHtml(currentHtml) : currentHtml;
            htmlEditor.value = finalHtml;
        }
    }

    // Event listeners
    fetchBtn.addEventListener('click', fetchSource);
    document.getElementById('copyBtn').addEventListener('click', copySource);
    document.getElementById('downloadBtn').addEventListener('click', downloadSource);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('refreshPreviewBtn').addEventListener('click', refreshPreview);
    document.getElementById('openPreviewBtn').addEventListener('click', openPreviewNewTab);
    targetUrlInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') fetchSource(); });
    prettyCheckbox.addEventListener('change', reRender);
    rawCheckbox.addEventListener('change', reRender);

    addLog(`WEBGHOST 1500 PROXY READY · ${PROXY_LIST.length} proxies + 14 methods = ${PROXY_LIST.length + 14} total routes`, 'success');
</script>
